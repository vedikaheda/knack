version: "3.9"

services:
  openclaw:
    image: openclaw/openclaw:latest
    container_name: openclaw
    restart: always
    environment:
      - OPENCLAW_ENV=production
      - SLACK_ENABLED=true
      - SLACK_MODE=socket
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - BACKEND_API_URL=http://backend:8000
    volumes:
      - openclaw_data:/root/.openclaw
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: backend
    restart: always
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_FRONTEND_REDIRECT=${GOOGLE_OAUTH_FRONTEND_REDIRECT}
      - GOOGLE_OAUTH_CALLBACK_DOCS=${GOOGLE_OAUTH_CALLBACK_DOCS}
      - CLAWDBOT_SERVICE_TOKEN=${CLAWDBOT_SERVICE_TOKEN}
      - OPENCLAW_HOOKS_URL=${OPENCLAW_HOOKS_URL}
      - OPENCLAW_HOOKS_TOKEN=${OPENCLAW_HOOKS_TOKEN}
      - APP_ENV=production
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "8501:8501"
    environment:
      - GOOGLE_OAUTH_FRONTEND_REDIRECT=${GOOGLE_OAUTH_FRONTEND_REDIRECT}
    depends_on:
      - backend

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  openclaw_data:
