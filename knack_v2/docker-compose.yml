x-attendee-common: &attendee-common
  image: knack_v2_attendee:${ATTENDEE_IMAGE_TAG:-latest}
  build:
    context: ./attendee
  restart: unless-stopped
  environment: &attendee-env
    DATABASE_URL: postgres://${ATTENDEE_POSTGRES_USER:-attendee}:${ATTENDEE_POSTGRES_PASSWORD:-attendee}@attendee-postgres:5432/${ATTENDEE_POSTGRES_DB:-attendee}
    REDIS_URL: redis://attendee-redis:6379/5
    DJANGO_SETTINGS_MODULE: attendee.settings.production
    DJANGO_SECRET_KEY: ${ATTENDEE_DJANGO_SECRET_KEY}
    CREDENTIALS_ENCRYPTION_KEY: ${ATTENDEE_CREDENTIALS_ENCRYPTION_KEY}
    POSTGRES_SSL_REQUIRE: "false"
    DJANGO_SSL_REQUIRE: ${ATTENDEE_DJANGO_SSL_REQUIRE:-false}
    DISABLE_EMAIL: ${ATTENDEE_DISABLE_EMAIL:-true}
    SITE_DOMAIN: ${ATTENDEE_SITE_DOMAIN:-localhost:8000}
    TIME_ZONE: ${ATTENDEE_TIME_ZONE:-UTC}
    ATTENDEE_LOG_LEVEL: ${ATTENDEE_LOG_LEVEL:-INFO}
    ATTENDEE_LOG_FORMAT: ${ATTENDEE_LOG_FORMAT:-json}
    AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
    AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    AWS_DEFAULT_REGION: ${ATTENDEE_AWS_DEFAULT_REGION:-us-east-1}
    AWS_ENDPOINT_URL: http://attendee-minio:9000
    AWS_RECORDING_STORAGE_BUCKET_NAME: ${ATTENDEE_RECORDING_BUCKET_NAME:-attendee-recordings}
  depends_on:
    - attendee-postgres
    - attendee-redis
    - attendee-minio
    - attendee-minio-init

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.3.1
    container_name: knack_v2_openclaw
    restart: unless-stopped
    environment:
      OPENCLAW_ENV: production
      SLACK_ENABLED: ${SLACK_ENABLED:-true}
      SLACK_MODE: socket
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
    volumes:
      - openclaw_data_v2:/home/node/.openclaw
      - ./state:/shared-state
      - ./tools/knack-v2:/home/node/.openclaw/workspace/knack-v2-plugin
    depends_on:
      - attendee-app
      - proof

  attendee-postgres:
    image: postgres:15.3-alpine
    container_name: knack_v2_attendee_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ATTENDEE_POSTGRES_DB:-attendee}
      POSTGRES_USER: ${ATTENDEE_POSTGRES_USER:-attendee}
      POSTGRES_PASSWORD: ${ATTENDEE_POSTGRES_PASSWORD:-attendee}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - attendee_postgres_data:/var/lib/postgresql/data

  attendee-redis:
    image: redis:7-alpine
    container_name: knack_v2_attendee_redis
    restart: unless-stopped
    volumes:
      - attendee_redis_data:/data

  attendee-minio:
    image: minio/minio:RELEASE.2026-02-25T13-28-29Z
    container_name: knack_v2_attendee_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${ATTENDEE_MINIO_API_PORT:-9000}:9000"
      - "${ATTENDEE_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - attendee_minio_data:/data

  attendee-minio-init:
    image: minio/mc:RELEASE.2026-03-12T17-29-24Z
    container_name: knack_v2_attendee_minio_init
    restart: "no"
    entrypoint:
      - sh
      - -lc
      - |
        until mc alias set local http://attendee-minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"; do
          sleep 2
        done
        mc mb --ignore-existing "local/${ATTENDEE_RECORDING_BUCKET_NAME:-attendee-recordings}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ATTENDEE_RECORDING_BUCKET_NAME: ${ATTENDEE_RECORDING_BUCKET_NAME:-attendee-recordings}
    depends_on:
      - attendee-minio

  attendee-app:
    <<: *attendee-common
    container_name: knack_v2_attendee_app
    ports:
      - "${ATTENDEE_PUBLIC_PORT:-8000}:8000"
    command:
      - sh
      - -lc
      - |
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn attendee.wsgi --bind 0.0.0.0:8000

  attendee-worker:
    <<: *attendee-common
    container_name: knack_v2_attendee_worker
    environment:
      <<: *attendee-env
      ENABLE_CHROME_SANDBOX: ${ATTENDEE_ENABLE_CHROME_SANDBOX:-false}
    command:
      - celery
      - -A
      - attendee
      - worker
      - -l
      - info

  attendee-scheduler:
    <<: *attendee-common
    container_name: knack_v2_attendee_scheduler
    command:
      - python
      - manage.py
      - run_scheduler

  proof-comment-poller:
    image: node:22-alpine
    container_name: knack_v2_proof_comment_poller
    restart: unless-stopped
    working_dir: /app
    command:
      - sh
      - -lc
      - |
        while true; do
          node /app/scripts/poll-proof-comments.mjs
          sleep ${POLLER_INTERVAL_SECONDS:-900}
        done
    environment:
      PROOF_BASE_URL: http://proof:4000
      TRACKED_DOCS_PATH: /shared-state/proof/tracked-docs.json
      OPENCLAW_HOOK_URL: http://openclaw:18789/hooks/agent
      OPENCLAW_HOOK_TOKEN: ${OPENCLAW_HOOK_TOKEN}
      OPENCLAW_AGENT_ID: ${OPENCLAW_AGENT_ID:-main}
      POLLER_AGENT_ID: ${POLLER_AGENT_ID:-knack-poller}
    volumes:
      - ./state:/shared-state
      - ./scripts:/app/scripts:ro
    depends_on:
      - openclaw
      - proof

  attendee-transcript-watcher:
    image: node:22-alpine
    container_name: knack_v2_attendee_transcript_watcher
    restart: unless-stopped
    working_dir: /app
    command:
      - sh
      - -lc
      - |
        while true; do
          node /app/scripts/poll-attendee-transcripts.mjs
          sleep ${ATTENDEE_POLLER_INTERVAL_SECONDS:-60}
        done
    environment:
      ATTENDEE_BASE_URL: ${ATTENDEE_BASE_URL}
      ATTENDEE_API_KEY: ${ATTENDEE_API_KEY}
      ATTENDEE_TRACKED_BOTS_PATH: ${ATTENDEE_TRACKED_BOTS_PATH:-/shared-state/attendee/tracked-bots.json}
      OPENCLAW_HOOK_URL: http://openclaw:18789/hooks/agent
      OPENCLAW_HOOK_TOKEN: ${OPENCLAW_HOOK_TOKEN}
      OPENCLAW_AGENT_ID: ${OPENCLAW_AGENT_ID:-main}
    volumes:
      - ./state:/shared-state
      - ./scripts:/app/scripts:ro
    depends_on:
      - attendee-app
      - openclaw

  proof:
    build:
      context: ./proof
      dockerfile: Dockerfile
      args:
        PROOF_GIT_REF: ${PROOF_GIT_REF:-main}
    container_name: knack_v2_proof
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_PATH: /opt/proof-sdk/proof-share.db
      PROOF_PUBLIC_ORIGIN: ${PROOF_PUBLIC_ORIGIN}
      PROOF_PUBLIC_BASE_URL: ${PROOF_PUBLIC_BASE_URL}
      PROOF_CORS_ALLOW_ORIGINS: ${PROOF_CORS_ALLOW_ORIGINS}
      PROOF_COLLAB_SIGNING_SECRET: ${PROOF_COLLAB_SIGNING_SECRET}
    volumes:
      - proof_data:/opt/proof-sdk
    ports:
      - "4000:4000"

volumes:
  openclaw_data_v2:
  proof_data:
  attendee_postgres_data:
  attendee_redis_data:
  attendee_minio_data:
